<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="cloudShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e3a8a" flood-opacity="0.2"/>
    </filter>
    <filter id="sunBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Full bleed background (maskable needs full rect, no rounding) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- All content inside safe zone (inner 80% = 51.2px padding each side) -->
  <g transform="translate(51, 51) scale(0.8)">
    <!-- Sun glow -->
    <circle cx="320" cy="130" r="80" fill="url(#sunGlow)"/>

    <!-- Sun rays -->
    <g opacity="0.5" filter="url(#sunBlur)">
      <line x1="320" y1="65" x2="320" y2="45" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
      <line x1="370" y1="82" x2="383" y2="67" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
      <line x1="388" y1="130" x2="408" y2="130" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
      <line x1="370" y1="178" x2="383" y2="193" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
      <line x1="270" y1="82" x2="257" y2="67" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Sun -->
    <circle cx="320" cy="130" r="44" fill="url(#sun)"/>
    <circle cx="309" cy="119" r="38" fill="white" opacity="0.1"/>

    <!-- Cloud -->
    <g filter="url(#cloudShadow)">
      <ellipse cx="165" cy="245" rx="55" ry="52" fill="white"/>
      <ellipse cx="240" cy="220" rx="68" ry="65" fill="white"/>
      <ellipse cx="315" cy="240" rx="58" ry="54" fill="white"/>
      <rect x="118" y="245" width="250" height="48" rx="10" fill="white"/>
    </g>

    <!-- Cloud highlight -->
    <ellipse cx="225" cy="208" rx="45" ry="25" fill="white" opacity="0.4"/>

    <!-- Rain drops -->
    <g opacity="0.8">
      <line x1="178" y1="312" x2="168" y2="338" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
      <line x1="222" y1="318" x2="212" y2="348" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
      <line x1="266" y1="312" x2="256" y2="338" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
      <line x1="310" y1="318" x2="300" y2="348" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Thermometer -->
    <g transform="translate(82, 312)" opacity="0.85">
      <rect x="0" y="0" width="9" height="36" rx="4.5" fill="white" opacity="0.3"/>
      <rect x="0" y="16" width="9" height="20" rx="4.5" fill="#ef4444" opacity="0.8"/>
      <circle cx="4.5" cy="43" r="9" fill="#ef4444" opacity="0.8"/>
      <circle cx="4.5" cy="43" r="6" fill="#fca5a5"/>
    </g>

    <!-- METEO text -->
    <text x="256" y="438" text-anchor="middle" fill="white" font-size="58" font-weight="800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="5">METEO</text>

    <!-- Subtext -->
    <text x="256" y="468" text-anchor="middle" fill="white" font-size="19" font-weight="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="4" opacity="0.55">MULTI-SURSĂ</text>
  </g>
</svg>
