<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <!-- Sun gradient -->
    <radialGradient id="sun" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <!-- Cloud shadow -->
    <filter id="cloudShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e3a8a" flood-opacity="0.25"/>
    </filter>
    <!-- Sun rays glow -->
    <filter id="sunBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e3a8a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="4" y="4" width="504" height="504" rx="106" ry="106" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Sun glow (behind cloud) -->
  <circle cx="320" cy="145" r="90" fill="url(#sunGlow)"/>

  <!-- Sun rays -->
  <g opacity="0.5" filter="url(#sunBlur)">
    <line x1="320" y1="70" x2="320" y2="48" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <line x1="375" y1="90" x2="390" y2="73" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <line x1="395" y1="145" x2="417" y2="145" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <line x1="375" y1="200" x2="390" y2="217" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <line x1="265" y1="90" x2="250" y2="73" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Sun -->
  <circle cx="320" cy="145" r="48" fill="url(#sun)"/>
  <circle cx="308" cy="133" r="42" fill="white" opacity="0.12"/>

  <!-- Main cloud (white, foreground) -->
  <g filter="url(#cloudShadow)">
    <ellipse cx="165" cy="260" rx="58" ry="55" fill="white"/>
    <ellipse cx="240" cy="235" rx="72" ry="68" fill="white"/>
    <ellipse cx="315" cy="255" rx="62" ry="58" fill="white"/>
    <rect x="115" y="260" width="255" height="52" rx="10" fill="white"/>
  </g>

  <!-- Cloud highlight -->
  <ellipse cx="225" cy="220" rx="50" ry="30" fill="white" opacity="0.5"/>

  <!-- Rain drops -->
  <g opacity="0.85">
    <line x1="175" y1="330" x2="165" y2="358" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="220" y1="338" x2="210" y2="370" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="265" y1="330" x2="255" y2="358" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="310" y1="338" x2="300" y2="370" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Temperature indicator (small thermometer) -->
  <g transform="translate(80, 330)" opacity="0.9">
    <rect x="0" y="0" width="10" height="40" rx="5" fill="white" opacity="0.3"/>
    <rect x="0" y="18" width="10" height="22" rx="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="5" cy="48" r="10" fill="#ef4444" opacity="0.8"/>
    <circle cx="5" cy="48" r="7" fill="#fca5a5"/>
  </g>

  <!-- "METEO" text -->
  <text x="256" y="448" text-anchor="middle" fill="white" font-size="60" font-weight="800" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="6" filter="url(#textShadow)">METEO</text>

  <!-- Subtle "multi-sursa" subtext -->
  <text x="256" y="478" text-anchor="middle" fill="white" font-size="20" font-weight="500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="4" opacity="0.6">MULTI-SURSĂ</text>
</svg>
