<!DOCTYPE html>
<html><body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(1, '#1d4ed8');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  // Sun
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(size*0.6, size*0.35, size*0.15, 0, Math.PI*2);
  ctx.fill();
  // Cloud
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(size*0.35, size*0.55, size*0.12, 0, Math.PI*2);
  ctx.arc(size*0.5, size*0.5, size*0.15, 0, Math.PI*2);
  ctx.arc(size*0.65, size*0.55, size*0.12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillRect(size*0.25, size*0.55, size*0.5, size*0.08);
  // Text
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size*0.12}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('METEO', size/2, size*0.82);
}
drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
</script>
</body></html>
